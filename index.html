<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>칸칸 — 현장 맞춤 계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home">

  <!-- ── 상단 헤더 (티커만) ── -->
  <header class="topbar">
    <span class="topbar-update">
      <span class="topbar-label">UPDATE</span>
      <span id="topbarNotice"></span>
    </span>
  </header>

  <!-- 모바일 드로어 오버레이 -->
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <!-- ── 전체 레이아웃 래퍼 ── -->
  <div class="layout">

    <!-- ── 좌측 사이드바 (드로어) ── -->
    <aside class="sidebar" id="sidebar" data-root=""></aside>

    <!-- ── 카테고리 탭 (햄버거 + 탭 + 검색 + 점메뉴) ── -->
    <nav class="category-tabs" id="categoryTabs">
      <button class="btn-hamburger" id="btnHamburger" aria-label="메뉴 열기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <a href="index.html" class="topbar-logo-mobile">KAN KAN</a>
      <div class="cat-tabs-list">
        <button class="cat-tab active" data-cat="">전체</button>
        <button class="cat-tab" data-cat="단열재/목공/보드">단열재</button>
        <button class="cat-tab" data-cat="마감/인테리어">마감·인테리어</button>
        <button class="cat-tab" data-cat="창호/도어/유리">창호·도어</button>
        <button class="cat-tab" data-cat="기타">기타</button>
      </div>
      <div class="tab-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="계산기 검색..." id="heroSearch" autocomplete="off" />
      </div>
      <button class="btn-dotmenu" id="btnDotMenu" aria-label="계산 내역">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
        </svg>
      </button>
    </nav>

    <!-- ── 메인 콘텐츠 ── -->
    <main class="main-content">

      <!-- 히어로 배너 (컴팩트) -->
      <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-body">
          <p class="hero-sub">현장 오차를 줄이는 정밀 실무 로직 · 셀프 인테리어의 필수 도구</p>
          <h1 class="hero-title">자재 발주가 두려운 당신에게,<br>전문가의 실무 로직을 담은 계산기</h1>
        </div>
      </section>

      <!-- 빠른 단위 변환 -->
      <section class="unit-converter">
        <h2 class="section-title">빠른 단위 변환</h2>
        <p class="section-sub">현장에서 자주 쓰는 단위를 바로 확인하세요.</p>
        <div class="converter-row">
          <div class="converter-group">
            <input type="number" class="conv-input" id="pyeong" placeholder="평" step="any" />
            <span class="conv-unit">평</span>
            <span class="conv-arrow">↔</span>
            <input type="number" class="conv-input" id="sqm" placeholder="m²" step="any" />
            <span class="conv-unit">m²</span>
          </div>
          <div class="converter-group">
            <input type="number" class="conv-input" id="mm" placeholder="mm" step="any" />
            <span class="conv-unit">mm</span>
            <span class="conv-arrow">↔</span>
            <input type="number" class="conv-input" id="meter" placeholder="m" step="any" />
            <span class="conv-unit">m</span>
          </div>
        </div>
      </section>

      <!-- 계산기 그리드 -->
      <section class="calc-grid-section">
        <h2 class="section-title center" id="gridTitle">계산기 한번에 보기</h2>
        <div class="calc-grid" id="calcGrid"></div>
      </section>

      <!-- 푸터 -->
      <footer class="site-footer">
        <div class="footer-links">
          <a href="#">개인정보처리방침</a>
          <a href="#">이용약관</a>
          <a href="#">문의하기</a>
        </div>
        <p class="footer-copy">© 에너가드컴퍼니</p>
      </footer>

    </main>

    <!-- ── 우측 계산 내역 패널 (드로어) ── -->
    <aside class="history-panel" id="historyPanel">
      <div class="history-header">계산한 내역</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">아직 계산 내역이 없습니다.</div>
      </div>
    </aside>

  </div><!-- /layout -->

  <script src="sidebar.js"></script>
  <script src="history.js"></script>
  <script src="app.js"></script>
</body>
</html>
