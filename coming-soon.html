<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>준비중 — 칸칸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <button class="btn-hamburger" id="btnHamburger" aria-label="메뉴 열기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="topbar-update">
      <span class="topbar-label">UPDATE</span>
      <span id="topbarNotice"></span>
    </span>
    <a href="index.html" class="topbar-logo-mobile">KAN KAN</a>
    <div class="topbar-right">
      <button class="btn-dotmenu" id="btnDotMenu" aria-label="계산 내역">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- 모바일 드로어 오버레이 -->
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <div class="layout">

    <aside class="sidebar" id="sidebar" data-root=""></aside>

    <main class="main-content">
      <div class="coming-soon-wrap">
        <div class="coming-soon-icon">🔧</div>
        <h1 class="coming-soon-title">준비중입니다</h1>
        <p class="coming-soon-desc" id="calcNameDisplay"></p>
        <p class="coming-soon-sub">현장에서 바로 쓸 수 있는 실무 계산기를 열심히 만들고 있어요.<br/>조금만 기다려 주세요!</p>
        <a href="index.html" class="coming-soon-btn">← 홈으로 돌아가기</a>
      </div>

      <footer class="site-footer">
        <div class="footer-links">
          <a href="#">개인정보처리방침</a>
          <a href="#">이용약관</a>
          <a href="#">문의하기</a>
        </div>
        <p class="footer-copy">© 에너가드컴퍼니</p>
      </footer>
    </main>

  </div>


  <script src="sidebar.js"></script>
  <script src="history.js"></script>
  <script>
    // URL 파라미터에서 계산기 이름 꺼내기
    const params = new URLSearchParams(location.search);
    const name = params.get('name');
    if (name) {
      document.getElementById('calcNameDisplay').textContent = decodeURIComponent(name);
    }
  </script>
</body>
</html>
